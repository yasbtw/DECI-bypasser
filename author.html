
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    *{user-select: none;text-decoration: none;}
    body {
      width: 220px;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      padding: 15px;
      margin: 0;
      background-color: #f9fafb;
    }
    h3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #111827;
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    p {
      color: #6b7280;
      font-size: 13px;
      margin: 0 0 12px 0;
    }
    a {
      font-size: 11px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
      padding-top: 8px;
    }
    .run {
      display: inline-block;
      background-color: #e0f2fe;
      color: #035fa1;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;

    }

  </style>
</head>
<body>

  <h3>DECI Bypasser <div class="run">Running</div></h3>
  <p>Thanks for using this extension</p>
  <a href="https://github.com/yasbtw/">Made by <b>@yasbtw</b> on github</a>
</body>
</html>
