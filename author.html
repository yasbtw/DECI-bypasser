
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 15px;
      margin: 0;
      background-color: #f9fafb;
    }
    h3 {
      color: #111827;
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    p {
      color: #6b7280;
      font-size: 13px;
      margin: 0 0 12px 0;
    }
    .footer {
      font-size: 11px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
      padding-top: 8px;
    }
    .badge {
      display: inline-block;
      background-color: #e0f2fe;
      color: #0369a1;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h3>Bypass Active ⚡</h3>
  <div class="badge">Running</div>
  <p>Thanks for using this extension!</p>
  
  <div class="footer">
    Made with ❤️ by <b>Your Name</b>
  </div>

</body>
</html>
